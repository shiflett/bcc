server {
    listen 8080;
    server_name _;
    root /app/public;
    index router.php;
    client_max_body_size 50m;
    port_in_redirect off;

    location ~ ^/(includes|bin|db)/ {
        return 404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.gpx$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri /router.php?$query_string;
    }

    # Exact matches bypass nginx's automatic /admin → /admin/ directory redirect,
    # which rewrites the port in the Location header
    location = /admin {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/router.php;
        fastcgi_param REQUEST_URI /admin;
        include fastcgi_params;
    }

    location = /login {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/router.php;
        fastcgi_param REQUEST_URI /login;
        include fastcgi_params;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index router.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}